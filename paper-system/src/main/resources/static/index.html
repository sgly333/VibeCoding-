<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>论文自动分类与代码关联系统</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 16px; background: #f6f7fb; }
    .container { max-width: 1200px; margin: 0 auto; }
    .card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 6px rgba(0,0,0,.06); }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    input[type="text"], input[type="password"], select { padding: 8px; border-radius: 6px; border: 1px solid #d9d9d9; }
    button { padding: 8px 12px; border-radius: 6px; border: 1px solid #d9d9d9; background: #fff; cursor: pointer; }
    button.primary { background: #2f6fed; color: #fff; border-color: #2f6fed; }
    button.danger { background: #dc3545; color: #fff; border-color: #dc3545; }
    .muted { color: #666; font-size: 12px; }
    .groups { display: flex; flex-direction: column; gap: 14px; }
    .group-title { font-weight: 700; margin-bottom: 8px; font-size: 16px; }
    .paper-line {
      display: grid;
      grid-template-columns: minmax(260px, 1.1fr) minmax(280px, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid #eceef3;
      border-radius: 8px;
      margin-bottom: 8px;
      background: #fafafa;
    }
    .paper-meta { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .code-col { min-width: 0; }
    .code-link {
      display: inline-block;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .paper-actions { display: flex; gap: 8px; justify-self: end; }
    .btn-compact {
      height: 30px;
      padding: 0 10px !important;
      border-radius: 10px;
      font-size: 12px;
      line-height: 30px;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-edit {
      background: #fff;
      border: 1px solid #d1e2ff;
      color: #2f6fed;
    }
    .btn-edit:hover { background: rgba(47,111,237,.06); }
    .btn-del {
      background: #dc3545;
      border: 1px solid #dc3545;
      color: #fff;
    }
    .btn-del:hover { filter: brightness(.98); }
    .paper-header {
      display: grid;
      grid-template-columns: minmax(260px, 1.1fr) minmax(280px, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid #eceef3;
      margin-bottom: 8px;
      font-size: 12px;
      color: #667085;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .paper-header > div:last-child {
      justify-self: end;
    }
    .chip { display: inline-block; padding: 3px 8px; border-radius: 999px; background: #eef2ff; color: #3b5bff; font-size: 12px; margin-right: 6px; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { width: 520px; background: #fff; border-radius: 12px; padding: 16px; }
    .modal h3 { margin: 0 0 12px; }
    .divider { height: 1px; background: #eee; margin: 12px 0; }
    .checkboxes { display: flex; flex-wrap: wrap; gap: 10px; }
    label { display: flex; gap: 6px; align-items: center; }
    .login-wrap {
      position: fixed;
      inset: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      z-index: 999;
      background:
        radial-gradient(circle at 10% 10%, rgba(47,111,237,.16), transparent 35%),
        radial-gradient(circle at 90% 90%, rgba(74,222,128,.14), transparent 30%),
        #f4f7ff;
    }
    .login-card {
      width: 100%;
      max-width: 460px;
      height: auto;
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 14px 40px rgba(31, 64, 135, .16);
      border: 1px solid #eef2ff;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .brand-dot {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, #2f6fed, #4f8cff);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 14px;
    }
    .login-title { font-size: 24px; font-weight: 700; margin: 0; color: #1f2a44; }
    .login-subtitle { margin: 4px 0 0; color: #667085; font-size: 13px; }
    .field { margin-top: 12px; }
    .field-label { color: #475467; font-size: 13px; margin-bottom: 6px; display: block; }
    .field-box {
      display: flex; align-items: center; border: 1px solid #d0d5dd; border-radius: 10px;
      background: #fff; padding: 0 10px; transition: .2s border-color, .2s box-shadow;
    }
    .field-box:focus-within { border-color: #2f6fed; box-shadow: 0 0 0 4px rgba(47,111,237,.13); }
    .field-icon { color: #667085; margin-right: 8px; font-size: 13px; }
    .field-box input {
      width: 100%; border: 0 !important; outline: none; padding: 10px 0; background: transparent;
    }
    .login-btn {
      width: 100%; margin-top: 16px; height: 42px; border-radius: 10px; border: 0;
      background: linear-gradient(135deg, #2f6fed, #4f8cff); color: #fff; font-weight: 600; cursor: pointer;
    }
    .login-btn[disabled] { opacity: .6; cursor: not-allowed; }
    .login-hint {
      margin-top: 12px; font-size: 12px; color: #667085; background: #f8fafc;
      border: 1px dashed #d0d5dd; border-radius: 8px; padding: 10px;
    }
    .login-error {
      margin-top: 12px; color: #b42318; background: #fef3f2; border: 1px solid #fecdca;
      border-radius: 8px; padding: 10px; font-size: 13px;
    }
  </style>
</head>
<body>
<div class="container" id="root"></div>

<script type="text/babel">
  const { useEffect, useMemo, useState } = React;

  const CATEGORY_LIST = ["CF Based", "Graph Based", "Context Based", "Hybrid Based", "LLM Based"];
  const apiBase = window.location.origin; // 后端与前端同源（静态页面由后端托管）
  const LS_LAST_USERNAME = "paper_system_last_username";

  function readLastUsername() {
    try {
      return localStorage.getItem(LS_LAST_USERNAME) || "";
    } catch {
      return "";
    }
  }

  function saveLastUsername(username) {
    try {
      if (username && username.trim()) {
        localStorage.setItem(LS_LAST_USERNAME, username.trim());
      }
    } catch (_) {}
  }

  async function apiJson(path, options) {
    const res = await fetch(apiBase + path, options);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      const msg = data.message || ("Request failed: " + res.status);
      throw new Error(msg);
    }
    return data;
  }

  function App() {
    const [loginForm, setLoginForm] = useState(() => {
      const saved = readLastUsername();
      return {
        username: saved || "admin",
        password: "admin123",
      };
    });
    const [loggedIn, setLoggedIn] = useState(false);
    const [busy, setBusy] = useState(false);
    const [error, setError] = useState("");

    const [papers, setPapers] = useState([]);
    const [keyword, setKeyword] = useState("");
    const [category, setCategory] = useState("全部");

    const [file, setFile] = useState(null);
    const [uploadCodeUrl, setUploadCodeUrl] = useState("");
    const [uploadModalOpen, setUploadModalOpen] = useState(false);

    const [editPaper, setEditPaper] = useState(null); // paper object
    const [editForm, setEditForm] = useState({ categories: [], code_url: "" });

    const filteredCategory = category === "全部" ? "" : category;

    useEffect(() => {
      if (!loggedIn) return;
      loadPapers();
      // eslint-disable-next-line react-hooks/exhaustive-deps
    }, [loggedIn]);

    async function loadPapers() {
      setBusy(true);
      setError("");
      try {
        const params = new URLSearchParams();
        if (keyword.trim()) params.set("keyword", keyword.trim());
        if (filteredCategory) params.set("category", filteredCategory);
        const data = await apiJson("/api/papers" + (params.toString() ? ("?" + params.toString()) : ""));
        setPapers(data || []);
      } catch (e) {
        setError(e.message);
      } finally {
        setBusy(false);
      }
    }

    async function handleLogin() {
      setBusy(true);
      setError("");
      try {
        await apiJson("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(loginForm),
        });
        saveLastUsername(loginForm.username);
        setLoggedIn(true);
      } catch (e) {
        setError(e.message);
      } finally {
        setBusy(false);
      }
    }

    async function handleUpload() {
      if (!file) {
        setError("请选择 PDF 文件");
        return;
      }
      setBusy(true);
      setError("");
      try {
        const fd = new FormData();
        fd.append("file", file);
        if (uploadCodeUrl && uploadCodeUrl.trim()) {
          fd.append("code_url", uploadCodeUrl.trim());
        }
        const resp = await fetch(apiBase + "/api/papers/upload", { method: "POST", body: fd });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.message || "upload failed");

        // 上传完成后刷新列表（最稳）
        await loadPapers();

        setUploadModalOpen(false);
        setUploadCodeUrl("");
        setFile(null);
      } catch (e) {
        setError(e.message);
      } finally {
        setBusy(false);
      }
    }

    async function handleDelete(paperId) {
      if (!confirm("确认删除该论文记录？")) return;
      setBusy(true);
      setError("");
      try {
        await apiJson("/api/papers/" + paperId, { method: "DELETE" });
        await loadPapers();
      } catch (e) {
        setError(e.message);
      } finally {
        setBusy(false);
      }
    }

    function openEdit(paper) {
      setEditPaper(paper);
      setEditForm({
        categories: paper.categories || [],
        code_url: paper.code_url || "",
      });
    }

    async function handleSaveEdit() {
      if (!editPaper) return;
      setBusy(true);
      setError("");
      try {
        const body = {
          categories: editForm.categories,
          code_url: editForm.code_url,
        };
        await apiJson("/api/papers/" + editPaper.id, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        setEditPaper(null);
        await loadPapers();
      } catch (e) {
        setError(e.message);
      } finally {
        setBusy(false);
      }
    }

    const grouped = useMemo(() => {
      const map = new Map();
      CATEGORY_LIST.forEach(c => map.set(c, []));
      for (const p of papers) {
        const cats = p.categories || [];
        for (const c of cats) {
          if (map.has(c)) map.get(c).push(p);
        }
      }
      // 稍微去重：同一 paper 在组内不需要重复同分类
      for (const [k, arr] of map.entries()) {
        const seen = new Set();
        const next = [];
        for (const p of arr) {
          const id = p.id;
          if (!seen.has(id)) {
            seen.add(id);
            next.push(p);
          }
        }
        map.set(k, next);
      }
      return map;
    }, [papers]);

    if (!loggedIn) {
      return (
        <div className="login-wrap">
          <div className="login-card">
            <div className="brand">
              <div className="brand-dot">PDF</div>
              <div>
                <h2 className="login-title">论文自动分类系统</h2>
                <p className="login-subtitle">登录后可上传论文、自动分类并管理代码链接</p>
              </div>
            </div>

            <form
              onSubmit={(e) => {
                e.preventDefault();
                if (!busy) handleLogin();
              }}
            >
              <div className="field">
                <label className="field-label">用户名</label>
                <div className="field-box">
                  <span className="field-icon">@</span>
                  <input
                    type="text"
                    name="username"
                    autoComplete="username"
                    value={loginForm.username}
                    onChange={(e)=>setLoginForm({...loginForm, username: e.target.value})}
                    placeholder="请输入用户名"
                  />
                </div>
              </div>

              <div className="field">
                <label className="field-label">密码</label>
                <div className="field-box">
                  <span className="field-icon">*</span>
                  <input
                    type="password"
                    name="password"
                    autoComplete="current-password"
                    value={loginForm.password}
                    onChange={(e)=>setLoginForm({...loginForm, password: e.target.value})}
                    placeholder="请输入密码"
                  />
                </div>
              </div>

              <button className="login-btn" type="submit" disabled={busy}>
                {busy ? "登录中..." : "进入系统"}
              </button>
            </form>

            {error ? <div className="login-error">{error}</div> : null}
          </div>
        </div>
      );
    }

    return (
      <div>
        <div className="card">
          <div className="row" style={{ justifyContent: "space-between" }}>
            <div>
              <h2 style={{ margin: 0 }}>论文管理</h2>
              <div className="muted">上传 PDF 会自动抽取 Abstract/Introduction 并进行多标签分类</div>
            </div>
            <button onClick={() => { setLoggedIn(false); setPapers([]); }} disabled={busy}>退出</button>
          </div>

          <div className="divider"></div>

          <div className="row">
            <button
              className="primary"
              onClick={() => {
                setUploadCodeUrl("");
                setFile(null);
                setUploadModalOpen(true);
                setError("");
              }}
              disabled={busy}
            >
              {busy ? "准备中..." : "上传论文"}
            </button>
          </div>

          <div className="divider"></div>

          <div className="row">
            <div style={{ flex: 1, minWidth: 260 }}>
              <div className="muted">搜索关键词（文件名）</div>
              <input type="text" value={keyword} onChange={(e)=>setKeyword(e.target.value)} placeholder="例如：GNN" />
            </div>
            <div style={{ width: 240 }}>
              <div className="muted">按分类过滤</div>
              <select value={category} onChange={(e)=>setCategory(e.target.value)}>
                <option value="全部">全部</option>
                {CATEGORY_LIST.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <button onClick={loadPapers} disabled={busy}>搜索</button>
          </div>
        </div>

        <div className="groups">
          {CATEGORY_LIST.map(c => (
            <div key={c} className="card" style={{ marginBottom: 0 }}>
              <div className="group-title">{c}</div>
              {(grouped.get(c) || []).length === 0 ? (
                <div className="muted">暂无论文</div>
              ) : null}
              {(grouped.get(c) || []).length > 0 ? (
                <div className="paper-header">
                  <div>PDF 文件</div>
                  <div>Code URL</div>
                  <div>操作</div>
                </div>
              ) : null}
              {(grouped.get(c) || []).map(p => (
                <div key={p.id} className="paper-line">
                  <div className="paper-meta">
                    <a href={p.file_url || p.fileUrl} target="_blank" rel="noreferrer" style={{ textDecoration: "none" }}>
                      <div style={{ fontWeight: 700 }}>{p.title}</div>
                    </a>
                    <div className="muted">
                      多标签：
                      {(p.categories || []).slice(0, 5).map(cc => <span key={cc} className="chip">{cc}</span>)}
                    </div>
                  </div>
                  <div className="code-col">
                    {(p.code_url || p.codeUrl) ? (
                      <a className="code-link" href={p.code_url || p.codeUrl} target="_blank" rel="noreferrer">
                        {p.code_url || p.codeUrl}
                      </a>
                    ) : <span className="muted">未填写 code_url</span>}
                  </div>
                  <div className="paper-actions">
                    <button className="btn-compact btn-edit" onClick={() => openEdit(p)} disabled={busy}>编辑</button>
                    <button className="btn-compact btn-del" onClick={() => handleDelete(p.id)} disabled={busy}>删除</button>
                  </div>
                </div>
              ))}
            </div>
          ))}
        </div>

        {editPaper ? (
          <div className="modal-backdrop" onMouseDown={(e)=>{ if (e.target === e.currentTarget) setEditPaper(null); }}>
            <div className="modal">
              <h3>编辑论文</h3>
              <div className="muted">ID: {editPaper.id} / 标题：{editPaper.title}</div>
              <div className="divider"></div>
              <div className="muted" style={{ marginBottom: 6 }}>分类（多选）</div>
              <div className="checkboxes">
                {CATEGORY_LIST.map(c => (
                  <label key={c}>
                    <input
                      type="checkbox"
                      checked={(editForm.categories || []).includes(c)}
                      onChange={(e) => {
                        const checked = e.target.checked;
                        let next = new Set(editForm.categories || []);
                        if (checked) next.add(c); else next.delete(c);
                        setEditForm({ ...editForm, categories: Array.from(next) });
                      }}
                    />
                    <span>{c}</span>
                  </label>
                ))}
              </div>

              <div className="divider"></div>
              <div className="muted" style={{ marginBottom: 6 }}>code_url</div>
              <input
                type="text"
                value={editForm.code_url || ""}
                onChange={(e) => setEditForm({ ...editForm, code_url: e.target.value })}
                style={{ width: "100%" }}
                placeholder="例如：https://github.com/xxx/xxx"
              />

              <div className="divider"></div>
              <div className="row" style={{ justifyContent: "flex-end" }}>
                <button onClick={() => setEditPaper(null)} disabled={busy}>取消</button>
                <button className="primary" onClick={handleSaveEdit} disabled={busy}>保存</button>
              </div>
            </div>
          </div>
        ) : null}

        {uploadModalOpen ? (
          <div
            className="modal-backdrop"
            onMouseDown={(e) => {
              if (e.target === e.currentTarget) setUploadModalOpen(false);
            }}
          >
            <div className="modal">
              <h3>上传论文</h3>
              <div className="muted">选择 PDF，会自动解析 Abstract/Introduction 并完成多标签分类</div>
              <div className="divider"></div>

              <div className="muted" style={{ marginBottom: 6 }}>PDF 文件</div>
              <input
                type="file"
                accept="application/pdf"
                onChange={(e) => setFile(e.target.files && e.target.files[0] ? e.target.files[0] : null)}
              />
              {file ? <div className="muted" style={{ marginTop: 6, fontSize: 12 }}>已选择：{file.name}</div> : null}

              <div className="divider"></div>
              <div className="muted" style={{ marginBottom: 6 }}>code_url（可选）</div>
              <input
                type="text"
                value={uploadCodeUrl}
                onChange={(e) => setUploadCodeUrl(e.target.value)}
                style={{ width: "100%" }}
                placeholder="例如：https://github.com/xxx/xxx"
              />

              {error ? (
                <div style={{ marginTop: 12, color: "#dc3545", fontSize: 13 }}>{error}</div>
              ) : null}

              <div className="divider"></div>
              <div className="row" style={{ justifyContent: "flex-end" }}>
                <button
                  onClick={() => {
                    setUploadModalOpen(false);
                    setError("");
                  }}
                  disabled={busy}
                >
                  取消
                </button>
                <button className="primary" onClick={handleUpload} disabled={busy || !file}>
                  {busy ? "上传中..." : "确认上传"}
                </button>
              </div>
            </div>
          </div>
        ) : null}
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
</script>
</body>
</html>
