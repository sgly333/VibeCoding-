<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>论文自动分类与代码关联系统</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; background: #f6f7fb; }
    .container { max-width: 1280px; margin: 0 auto; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(38, 61, 117, .08);
      border: 1px solid #edf2ff;
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .card:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(38, 61, 117, .12); }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    input[type="text"], input[type="password"], select { padding: 8px; border-radius: 6px; border: 1px solid #d9d9d9; }
    button { padding: 8px 12px; border-radius: 6px; border: 1px solid #d9d9d9; background: #fff; cursor: pointer; }
    button.primary { background: #2f6fed; color: #fff; border-color: #2f6fed; }
    button.danger { background: #dc3545; color: #fff; border-color: #dc3545; }
    .muted { color: #666; font-size: 12px; }
    .groups { display: flex; flex-direction: column; gap: 14px; }
    .group-title { font-weight: 700; margin-bottom: 8px; font-size: 16px; }
    .category-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .category-head .group-title { margin-bottom: 0; }
    .btn-mini {
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid rgba(47,111,237,.22);
      background: rgba(47,111,237,.06);
      color: #2f6fed;
    }
    .btn-mini:hover { background: rgba(47,111,237,.10); }
    .btn-mini-danger {
      border: 1px solid rgba(239, 68, 68, .25);
      background: rgba(239, 68, 68, .08);
      color: #ef4444;
    }
    .btn-mini-danger:hover { background: rgba(239, 68, 68, .12); }
    .btn-mini[disabled] { opacity: .55; cursor: not-allowed; }

    .btn-upload {
      background: linear-gradient(135deg, #2f6fed, #4f8cff);
      border-color: transparent !important;
      color: #fff;
    }
    .btn-upload:hover { filter: saturate(1.05); }
    .btn-addcat {
      background: linear-gradient(135deg, #30ad0a9a, #48fa02f6) !important;
      border-color: transparent !important;
      color: #fff !important;
    }
    .btn-addcat:hover { filter: saturate(1.05); }
    .btn-direction {
      background: linear-gradient(135deg, #f59e0b, #f97316) !important;
      border-color: transparent !important;
      color: #fff !important;
    }
    .btn-direction:hover { filter: saturate(1.05); }
    .toolbar-btn {
      height: 42px;
      min-width: 108px;
      padding: 0 14px !important;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .btn-search {
      background: #8568eefa;
      border: 1px solid #d0d5dd;
      color: #f3f3f3;
    }
    .btn-logout {
      background: #f35e5ee8;
      border: 1px solid #d0d5dd;
      color: hsl(216, 12%, 92%);
    }
    .toolbar-control {
      height: 42px;
      width: 100%;
      border-radius: 10px !important;
      border: 1px solid #d0d5dd !important;
      padding: 0 12px !important;
      font-size: 14px;
      background: rgba(255,255,255,.9);
      color: #344054;
      box-sizing: border-box;
      transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
    }
    .toolbar-control:focus {
      outline: none;
      border-color: #2f6fed !important;
      box-shadow: 0 0 0 4px rgba(47,111,237,.12);
      background: #fff;
    }
    .toolbar-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .search-strip {
      border: 1px solid #dbe3f4;
      background: rgba(255,255,255,.72);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      gap: 10px;
      align-items: end;
      flex-wrap: wrap;
    }
    .search-strip .toolbar-block .muted {
      font-size: 11px;
      color: #667085;
    }
    .search-btn-wrap {
      display: flex;
      align-items: end;
      height: 100%;
    }
    .category-card {
      position: relative;
      overflow: hidden;
    }
    .category-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      height: 2px;
      width: 100%;
      background: var(--accent, #2f6fed);
      opacity: .95;
    }
    .category-card::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      height: 44px;
      width: 100%;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent, #2f6fed) 16%, transparent) 0%, transparent 80%);
      pointer-events: none;
    }
    .paper-line {
      display: grid;
      grid-template-columns: minmax(260px, 1.1fr) minmax(280px, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid #eceef3;
      border-radius: 8px;
      margin-bottom: 8px;
      background: #fafafa;
      transition: background .15s ease, border-color .15s ease;
    }
    .paper-line:hover { background: #f4f7ff; border-color: #dbe6ff; }
    .paper-meta { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .code-col { min-width: 0; }
    .code-link {
      display: inline-block;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .paper-actions { display: flex; gap: 8px; justify-self: end; }
    .btn-compact {
      height: 30px;
      padding: 0 10px !important;
      border-radius: 10px;
      font-size: 12px;
      line-height: 30px;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-edit {
      background: #fff;
      border: 1px solid #d1e2ff;
      color: #2f6fed;
    }
    .btn-edit:hover { background: rgba(47,111,237,.06); }
    .btn-del {
      background: #dc3545;
      border: 1px solid #dc3545;
      color: #fff;
    }
    .btn-del:hover { filter: brightness(.98); }
    .paper-header {
      display: grid;
      grid-template-columns: minmax(260px, 1.1fr) minmax(280px, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid #eceef3;
      margin-bottom: 8px;
      font-size: 12px;
      color: #667085;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .paper-header > div:last-child {
      justify-self: end;
    }
    .chip { display: inline-block; padding: 3px 8px; border-radius: 999px; background: #eef2ff; color: #3b5bff; font-size: 12px; margin-right: 6px; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { width: 520px; background: #fff; border-radius: 12px; padding: 16px; }
    .modal h3 { margin: 0 0 12px; }
    .divider { height: 1px; background: #eee; margin: 12px 0; }
    .checkboxes { display: flex; flex-wrap: wrap; gap: 10px; }
    label { display: flex; gap: 6px; align-items: center; }
    .login-wrap {
      position: fixed;
      inset: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      z-index: 999;
      background:
        radial-gradient(circle at 10% 10%, rgba(47,111,237,.16), transparent 35%),
        radial-gradient(circle at 90% 90%, rgba(74,222,128,.14), transparent 30%),
        #f4f7ff;
    }
    .login-card {
      width: 100%;
      max-width: 460px;
      height: auto;
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 14px 40px rgba(31, 64, 135, .16);
      border: 1px solid #eef2ff;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .brand-dot {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, #2f6fed, #4f8cff);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 14px;
      animation: pulse 2.2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(47,111,237,.35); }
      70% { box-shadow: 0 0 0 10px rgba(47,111,237,0); }
      100% { box-shadow: 0 0 0 0 rgba(47,111,237,0); }
    }
    .login-title { font-size: 24px; font-weight: 700; margin: 0; color: #1f2a44; }
    .login-subtitle { margin: 4px 0 0; color: #667085; font-size: 13px; }
    .field { margin-top: 12px; }
    .field-label { color: #475467; font-size: 13px; margin-bottom: 6px; display: block; }
    .field-box {
      display: flex; align-items: center; border: 1px solid #d0d5dd; border-radius: 10px;
      background: #fff; padding: 0 10px; transition: .2s border-color, .2s box-shadow;
    }
    .field-box:focus-within { border-color: #2f6fed; box-shadow: 0 0 0 4px rgba(47,111,237,.13); }
    .field-icon { color: #667085; margin-right: 8px; font-size: 13px; }
    .field-box input {
      width: 100%; border: 0 !important; outline: none; padding: 10px 0; background: transparent;
    }
    .login-btn {
      width: 100%; margin-top: 16px; height: 42px; border-radius: 10px; border: 0;
      background: linear-gradient(135deg, #2f6fed, #4f8cff); color: #fff; font-weight: 600; cursor: pointer;
      transition: transform .12s ease, filter .12s ease;
    }
    .login-btn:hover { transform: translateY(-1px); filter: saturate(1.08); }
    .login-btn[disabled] { opacity: .6; cursor: not-allowed; }
    .login-hint {
      margin-top: 12px; font-size: 12px; color: #667085; background: #f8fafc;
      border: 1px dashed #d0d5dd; border-radius: 8px; padding: 10px;
    }
    .login-error {
      margin-top: 12px; color: #b42318; background: #fef3f2; border: 1px solid #fecdca;
      border-radius: 8px; padding: 10px; font-size: 13px;
    }
    .toast-wrap {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      min-width: 240px;
      max-width: 420px;
      border-radius: 10px;
      padding: 10px 12px;
      color: #fff;
      font-size: 13px;
      box-shadow: 0 10px 24px rgba(17, 24, 39, .18);
      animation: slideIn .22s ease;
    }
    .toast.success { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .toast.info { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px) translateX(14px); }
      to { opacity: 1; transform: translateY(0) translateX(0); }
    }
    .dashboard-wrap {
      min-height: 100vh;
      padding: 12px 16px 20px;
      background:
        radial-gradient(900px 340px at -10% -5%, rgba(47,111,237,.18), transparent 58%),
        radial-gradient(700px 300px at 110% 20%, rgba(16,185,129,.16), transparent 55%),
        linear-gradient(180deg, #f7f9ff 0%, #f4f7fb 40%, #f7faff 100%);
    }
    .dashboard-wrap .card {
      background: rgba(255, 255, 255, .68) !important;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, .35);
      box-shadow: 0 6px 16px rgba(38, 61, 117, .05);
    }
  </style>
</head>
<body>
<div class="container" id="root"></div>

<script type="text/babel">
  const { useEffect, useMemo, useState } = React;

  const DEFAULT_CATEGORY_LIST = ["CF Based", "Graph Based", "Context Based", "Hybrid Based", "LLM Based"];
  const apiBase = window.location.origin; // 后端与前端同源（静态页面由后端托管）
  const LS_LAST_USERNAME = "paper_system_last_username";

  function readLastUsername() {
    try {
      return localStorage.getItem(LS_LAST_USERNAME) || "";
    } catch {
      return "";
    }
  }

  function saveLastUsername(username) {
    try {
      if (username && username.trim()) {
        localStorage.setItem(LS_LAST_USERNAME, username.trim());
      }
    } catch (_) {}
  }

  async function apiJson(path, options) {
    const res = await fetch(apiBase + path, options);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      const msg = data.message || ("Request failed: " + res.status);
      throw new Error(msg);
    }
    return data;
  }

  function App() {
    const [loginForm, setLoginForm] = useState(() => {
      const saved = readLastUsername();
      return {
        username: saved || "admin",
        password: "admin123",
      };
    });
    const [loggedIn, setLoggedIn] = useState(false);
    const [busy, setBusy] = useState(false);
    const [error, setError] = useState("");
    const [toasts, setToasts] = useState([]);

    const [papers, setPapers] = useState([]);
    const [keyword, setKeyword] = useState("");
    const [category, setCategory] = useState("全部");
    const [categoryList, setCategoryList] = useState(DEFAULT_CATEGORY_LIST.map((n, idx) => ({ id: -(idx + 1), name: n, theme_color: "", description: "" })));

    const [addCategoryModalOpen, setAddCategoryModalOpen] = useState(false);
    const [newCategoryName, setNewCategoryName] = useState("");
    const [newCategoryColor, setNewCategoryColor] = useState("#2f6fed");
    const [newCategoryDescription, setNewCategoryDescription] = useState("");
    const [addingCategory, setAddingCategory] = useState(false);

    const [editCategoryModalOpen, setEditCategoryModalOpen] = useState(false);
    const [editCategoryId, setEditCategoryId] = useState(null);
    const [editCategoryName, setEditCategoryName] = useState("");
    const [editCategoryColor, setEditCategoryColor] = useState("#2f6fed");
    const [editCategoryDescription, setEditCategoryDescription] = useState("");
    const [updatingCategory, setUpdatingCategory] = useState(false);

    const [file, setFile] = useState(null);
    const [uploadCodeUrl, setUploadCodeUrl] = useState("");
    const [uploadModalOpen, setUploadModalOpen] = useState(false);
    const [researchDirection, setResearchDirection] = useState("");
    const [researchDirectionModalOpen, setResearchDirectionModalOpen] = useState(false);
    const [savingResearchDirection, setSavingResearchDirection] = useState(false);

    const [editPaper, setEditPaper] = useState(null); // paper object
    const [editForm, setEditForm] = useState({ categories: [], code_url: "" });

    const filteredCategory = category === "全部" ? "" : category;

    function hashToHue(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = (h * 31 + str.charCodeAt(i)) >>> 0;
      }
      return h % 360;
    }

    function categoryAccent(categoryName) {
      const fixed = {
        "CF Based": "#2f6fed",
        "Graph Based": "#8b5cf6",
        "Context Based": "#f59e0b",
        "Hybrid Based": "#10b981",
        "LLM Based": "#ef4444",
      };
      if (fixed[categoryName]) return fixed[categoryName];
      const hue = hashToHue(categoryName || "");
      return `hsl(${hue} 78% 52%)`;
    }

    const categoryColorByName = useMemo(() => {
      const m = new Map();
      for (const c of categoryList) {
        if (c && c.name) {
          m.set(c.name, c.theme_color || "");
        }
      }
      return m;
    }, [categoryList]);

    function categoryAccentFromData(categoryName) {
      const stored = categoryColorByName.get(categoryName);
      if (stored && stored.trim()) return stored.trim();
      return categoryAccent(categoryName);
    }

    function pushToast(message, type = "info") {
      const id = Date.now() + Math.random();
      setToasts(prev => [...prev, { id, message, type }]);
      window.setTimeout(() => {
        setToasts(prev => prev.filter(t => t.id !== id));
      }, 2400);
    }

    useEffect(() => {
      if (!loggedIn) return;
      loadPapers();
      loadCategories();
      loadResearchDirection();
      // eslint-disable-next-line react-hooks/exhaustive-deps
    }, [loggedIn]);

    async function loadCategories() {
      try {
        const data = await apiJson("/api/categories", { method: "GET" });
        if (Array.isArray(data)) {
          const normalized = data
            .filter(x => x && x.id != null && x.name)
            .map(x => ({ id: x.id, name: x.name, theme_color: x.theme_color || "", description: x.description || "" }));
          setCategoryList(normalized.length > 0 ? normalized : DEFAULT_CATEGORY_LIST.map((n, idx) => ({ id: -(idx + 1), name: n, theme_color: "", description: "" })));
          // 若当前筛选分类不存在于新列表，自动切回“全部”
          setCategory(prev => (normalized.some(c => c.name === prev) ? prev : "全部"));
        }
      } catch (_) {
        // 分类加载失败不影响其它功能
      }
    }

    async function loadResearchDirection() {
      try {
        const data = await apiJson("/api/settings/research-direction", { method: "GET" });
        setResearchDirection((data && (data.research_direction || data.researchDirection)) || "");
      } catch (_) {
        // 设置项加载失败不影响主要功能
      }
    }

    async function handleSaveResearchDirection() {
      setSavingResearchDirection(true);
      setError("");
      try {
        const payload = { research_direction: (researchDirection || "").trim() };
        await apiJson("/api/settings/research-direction", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        setResearchDirectionModalOpen(false);
        pushToast("研究方向已保存，后续上传会用于 LLM 分类", "success");
      } catch (e) {
        setError(e.message || "保存研究方向失败");
        pushToast("保存研究方向失败：" + (e.message || "未知错误"), "error");
      } finally {
        setSavingResearchDirection(false);
      }
    }

    async function handleAddCategory() {
      const name = (newCategoryName || "").trim();
      if (!name) {
        pushToast("请输入分类名称", "error");
        return;
      }

      setAddingCategory(true);
      setError("");
      try {
        await apiJson("/api/categories", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, theme_color: newCategoryColor, description: (newCategoryDescription || "").trim() }),
        });
        setNewCategoryName("");
        setNewCategoryColor("#2f6fed");
        setNewCategoryDescription("");
        setAddCategoryModalOpen(false);
        await loadCategories();
        pushToast("添加分类成功：" + name, "success");
      } catch (e) {
        pushToast("添加分类失败：" + e.message, "error");
        setError(e.message);
      } finally {
        setAddingCategory(false);
      }
    }

    function openEditCategory(cat) {
      if (!cat) return;
      setEditCategoryId(cat.id);
      setEditCategoryName(cat.name || "");
      setEditCategoryColor((cat.theme_color && cat.theme_color.trim()) ? cat.theme_color.trim() : categoryAccent(cat.name || ""));
      setEditCategoryDescription(cat.description || "");
      setEditCategoryModalOpen(true);
      setError("");
    }

    async function handleUpdateCategory() {
      const id = editCategoryId;
      const name = (editCategoryName || "").trim();
      if (id == null) {
        pushToast("缺少分类 ID，无法编辑", "error");
        return;
      }
      if (!name) {
        pushToast("请输入分类名称", "error");
        return;
      }

      setUpdatingCategory(true);
      setError("");
      try {
        await apiJson(`/api/categories/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, theme_color: editCategoryColor, description: (editCategoryDescription || "").trim() }),
        });
        setEditCategoryModalOpen(false);
        pushToast("分类已更新", "success");
        await loadCategories();
        await loadPapers();
      } catch (e) {
        pushToast("更新分类失败：" + e.message, "error");
        setError(e.message);
      } finally {
        setUpdatingCategory(false);
      }
    }

    async function handleDeleteCategory(cat) {
      if (!cat || cat.id == null) return;
      if (cat.id < 0) {
        pushToast("默认分类不可删除", "error");
        return;
      }
      if (!confirm(`确认删除分类「${cat.name}」？`)) return;

      setError("");
      try {
        await apiJson(`/api/categories/${cat.id}`, { method: "DELETE" });
        pushToast("分类删除成功", "success");
        await loadCategories();
        await loadPapers();
      } catch (e) {
        pushToast(e.message || "删除失败", "error");
        setError(e.message);
      }
    }

    async function loadPapers() {
      setBusy(true);
      setError("");
      try {
        const params = new URLSearchParams();
        if (keyword.trim()) params.set("keyword", keyword.trim());
        if (filteredCategory) params.set("category", filteredCategory);
        const data = await apiJson("/api/papers" + (params.toString() ? ("?" + params.toString()) : ""));
        setPapers(data || []);
      } catch (e) {
        setError(e.message);
      } finally {
        setBusy(false);
      }
    }

    async function handleLogin() {
      setBusy(true);
      setError("");
      try {
        await apiJson("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(loginForm),
        });
        saveLastUsername(loginForm.username);
        setLoggedIn(true);
        pushToast("登录成功，欢迎回来！", "success");
      } catch (e) {
        setError(e.message);
        pushToast("登录失败：" + e.message, "error");
      } finally {
        setBusy(false);
      }
    }

    async function handleUpload() {
      if (!file) {
        setError("请选择 PDF 文件");
        pushToast("请先选择一个 PDF 文件", "error");
        return;
      }
      setBusy(true);
      setError("");
      try {
        const fd = new FormData();
        fd.append("file", file);
        if (uploadCodeUrl && uploadCodeUrl.trim()) {
          fd.append("code_url", uploadCodeUrl.trim());
        }
        const resp = await fetch(apiBase + "/api/papers/upload", { method: "POST", body: fd });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.message || "upload failed");

        // 上传完成后刷新列表（最稳）
        await loadPapers();

        setUploadModalOpen(false);
        setUploadCodeUrl("");
        setFile(null);
        pushToast("论文上传成功，已完成自动分类", "success");
      } catch (e) {
        const msg = e.message || "";
        if (msg.includes("API Key")) {
          setError("上传失败：请先完善 LLM APIKey（application.yml 的 app.llm.api-key）");
          pushToast("请先完善 LLM APIKey 后再上传", "error");
        } else {
          setError(e.message);
          pushToast("上传失败：" + e.message, "error");
        }
      } finally {
        setBusy(false);
      }
    }

    async function handleDelete(paperId) {
      if (!confirm("确认删除该论文记录？")) return;
      setBusy(true);
      setError("");
      try {
        await apiJson("/api/papers/" + paperId, { method: "DELETE" });
        await loadPapers();
        pushToast("删除成功", "success");
      } catch (e) {
        setError(e.message);
        pushToast("删除失败：" + e.message, "error");
      } finally {
        setBusy(false);
      }
    }

    function openEdit(paper) {
      setEditPaper(paper);
      setEditForm({
        categories: paper.categories || [],
        code_url: paper.code_url || "",
      });
    }

    async function handleSaveEdit() {
      if (!editPaper) return;
      setBusy(true);
      setError("");
      try {
        const safeCategories = Array.isArray(editForm.categories) ? editForm.categories : [];
        const body = {
          categories: safeCategories,
          code_url: editForm.code_url,
        };
        await apiJson("/api/papers/" + editPaper.id, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        setEditPaper(null);
        await loadPapers();
        pushToast("保存成功", "success");
      } catch (e) {
        setError(e.message);
        pushToast("保存失败：" + e.message, "error");
      } finally {
        setBusy(false);
      }
    }

    const grouped = useMemo(() => {
      const map = new Map();
      categoryList.forEach(c => map.set(c.name, []));
      for (const p of papers) {
        const cats = p.categories || [];
        for (const c of cats) {
          if (!map.has(c)) map.set(c, []);
          map.get(c).push(p);
        }
      }
      // 稍微去重：同一 paper 在组内不需要重复同分类
      for (const [k, arr] of map.entries()) {
        const seen = new Set();
        const next = [];
        for (const p of arr) {
          const id = p.id;
          if (!seen.has(id)) {
            seen.add(id);
            next.push(p);
          }
        }
        map.set(k, next);
      }
      return map;
    }, [papers, categoryList]);

    if (!loggedIn) {
      return (
        <div className="login-wrap">
          <div className="toast-wrap">
            {toasts.map(t => (
              <div key={t.id} className={`toast ${t.type}`}>{t.message}</div>
            ))}
          </div>
          <div className="login-card">
            <div className="brand">
              <div className="brand-dot">PDF</div>
              <div>
                <h2 className="login-title">论文自动分类系统</h2>
                <p className="login-subtitle">登录后可上传论文、自动分类并管理代码链接</p>
              </div>
            </div>

            <form
              onSubmit={(e) => {
                e.preventDefault();
                if (!busy) handleLogin();
              }}
            >
              <div className="field">
                <label className="field-label">用户名</label>
                <div className="field-box">
                  <span className="field-icon">@</span>
                  <input
                    type="text"
                    name="username"
                    autoComplete="username"
                    value={loginForm.username}
                    onChange={(e)=>setLoginForm({...loginForm, username: e.target.value})}
                    placeholder="请输入用户名"
                  />
                </div>
              </div>

              <div className="field">
                <label className="field-label">密码</label>
                <div className="field-box">
                  <span className="field-icon">*</span>
                  <input
                    type="password"
                    name="password"
                    autoComplete="current-password"
                    value={loginForm.password}
                    onChange={(e)=>setLoginForm({...loginForm, password: e.target.value})}
                    placeholder="请输入密码"
                  />
                </div>
              </div>

              <button className="login-btn" type="submit" disabled={busy}>
                {busy ? "登录中..." : "进入系统"}
              </button>
            </form>

            {error ? <div className="login-error">{error}</div> : null}
          </div>
        </div>
      );
    }

    return (
      <div className="dashboard-wrap">
        <div className="toast-wrap">
          {toasts.map(t => (
            <div key={t.id} className={`toast ${t.type}`}>{t.message}</div>
          ))}
        </div>
        <div className="card">
          <div className="row" style={{ justifyContent: "space-between" }}>
            <div>
              <h2 style={{ margin: 0 }}>论文管理</h2>
              <div className="muted">上传 PDF 会自动抽取 Abstract/Introduction 并进行多标签分类</div>
            </div>
            <button className="toolbar-btn btn-logout" onClick={() => { setLoggedIn(false); setPapers([]); }} disabled={busy}>退出</button>
          </div>

          <div className="divider"></div>

          <div className="row" style={{ justifyContent: "space-between" }}>
            <div className="row">
              <button
                className="primary btn-upload toolbar-btn"
                onClick={() => {
                  setUploadCodeUrl("");
                  setFile(null);
                  setUploadModalOpen(true);
                  setError("");
                }}
                disabled={busy}
              >
                {busy ? "准备中..." : "上传论文"}
              </button>
              <button
                className="primary btn-addcat toolbar-btn"
                onClick={() => {
                  setNewCategoryName("");
                  setNewCategoryColor("#2f6fed");
                  setNewCategoryDescription("");
                  setAddCategoryModalOpen(true);
                  setError("");
                }}
                disabled={busy}
              >
                添加分类
              </button>
              <button
                className="primary btn-direction toolbar-btn"
                onClick={() => {
                  setResearchDirectionModalOpen(true);
                  setError("");
                }}
                disabled={busy}
              >
                设置研究方向
              </button>
            </div>
          </div>

          <div className="divider"></div>

          <div className="search-strip">
            <div className="toolbar-block" style={{ flex: 1, minWidth: 280 }}>
              <div className="muted">搜索关键词（文件名）</div>
              <input
                className="toolbar-control"
                type="text"
                value={keyword}
                onChange={(e)=>setKeyword(e.target.value)}
                placeholder="例如：GNN"
              />
            </div>
            <div className="toolbar-block" style={{ width: 260 }}>
              <div className="muted">按分类过滤</div>
              <select className="toolbar-control" value={category} onChange={(e)=>setCategory(e.target.value)}>
                <option value="全部">全部</option>
                {categoryList.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
              </select>
            </div>
            <div className="search-btn-wrap">
              <button className="toolbar-btn btn-search" onClick={loadPapers} disabled={busy}>搜索</button>
            </div>
          </div>
        </div>

        <div className="groups">
          {categoryList.map(c => (
            <div
              key={c.id ?? c.name}
              className="card category-card"
              style={{ marginBottom: 0, ["--accent"]: categoryAccentFromData(c.name) }}
            >
              <div className="category-head">
                <div className="group-title">{c.name}</div>
                <div className="row" style={{ gap: 8 }}>
                  <button className="btn-mini" onClick={() => openEditCategory(c)} disabled={busy}>
                    编辑
                  </button>
                  <button
                    className="btn-mini btn-mini-danger"
                    onClick={() => handleDeleteCategory(c)}
                    disabled={busy || (c.id != null && c.id < 0)}
                    title={(c.id != null && c.id < 0) ? "默认分类不可删除" : "删除分类"}
                  >
                    删除
                  </button>
                </div>
              </div>
              {(grouped.get(c.name) || []).length === 0 ? (
                <div className="muted">暂无论文</div>
              ) : null}
              {(grouped.get(c.name) || []).length > 0 ? (
                <div className="paper-header">
                  <div>PDF 文件</div>
                  <div>Code URL</div>
                  <div>操作</div>
                </div>
              ) : null}
              {(grouped.get(c.name) || []).map(p => (
                <div key={p.id} className="paper-line">
                  <div className="paper-meta">
                    <a href={p.file_url || p.fileUrl} target="_blank" rel="noreferrer" style={{ textDecoration: "none" }}>
                      <div style={{ fontWeight: 700 }}>{p.title}</div>
                    </a>
                    <div className="muted">
                      多标签：
                      {(p.categories || []).slice(0, 5).map(cc => <span key={cc} className="chip">{cc}</span>)}
                    </div>
                  </div>
                  <div className="code-col">
                    {(p.code_url || p.codeUrl) ? (
                      <a className="code-link" href={p.code_url || p.codeUrl} target="_blank" rel="noreferrer">
                        {p.code_url || p.codeUrl}
                      </a>
                    ) : <span className="muted">未填写 code_url</span>}
                  </div>
                  <div className="paper-actions">
                    <button className="btn-compact btn-edit" onClick={() => openEdit(p)} disabled={busy}>编辑</button>
                    <button className="btn-compact btn-del" onClick={() => handleDelete(p.id)} disabled={busy}>删除</button>
                  </div>
                </div>
              ))}
            </div>
          ))}
        </div>

        {editPaper ? (
          <div className="modal-backdrop" onMouseDown={(e)=>{ if (e.target === e.currentTarget) setEditPaper(null); }}>
            <div className="modal">
              <h3>编辑论文</h3>
              <div className="muted">ID: {editPaper.id} / 标题：{editPaper.title}</div>
              <div className="divider"></div>
              <div className="muted" style={{ marginBottom: 6 }}>分类（多选）</div>
              <div className="checkboxes">
                {categoryList.map(c => (
                  <label key={c.name}>
                    <input
                      type="checkbox"
                      checked={(editForm.categories || []).includes(c.name)}
                      onChange={(e) => {
                        const checked = e.target.checked;
                        let next = new Set(editForm.categories || []);
                        if (checked) next.add(c.name); else next.delete(c.name);
                        setEditForm({ ...editForm, categories: Array.from(next) });
                      }}
                    />
                    <span>{c.name}</span>
                  </label>
                ))}
              </div>

              <div className="divider"></div>
              <div className="muted" style={{ marginBottom: 6 }}>code_url</div>
              <input
                type="text"
                value={editForm.code_url || ""}
                onChange={(e) => setEditForm({ ...editForm, code_url: e.target.value })}
                style={{ width: "100%" }}
                placeholder="例如：https://github.com/xxx/xxx"
              />

              <div className="divider"></div>
              <div className="row" style={{ justifyContent: "flex-end" }}>
                <button onClick={() => setEditPaper(null)} disabled={busy}>取消</button>
                <button className="primary" onClick={handleSaveEdit} disabled={busy}>保存</button>
              </div>
            </div>
          </div>
        ) : null}

        {addCategoryModalOpen ? (
          <div
            className="modal-backdrop"
            onMouseDown={(e) => {
              if (e.target === e.currentTarget) setAddCategoryModalOpen(false);
            }}
          >
            <div className="modal">
              <h3>添加分类</h3>
              <div className="muted">填写分类名称，并为该分类选择主题色</div>
              <div className="divider"></div>

              <div className="muted" style={{ marginBottom: 6 }}>分类名称</div>
              <input
                type="text"
                value={newCategoryName}
                onChange={(e) => setNewCategoryName(e.target.value)}
                style={{ width: "100%" }}
                placeholder="例如：Reinforcement Learning Based"
              />

              <div className="divider"></div>
              <div className="muted" style={{ marginBottom: 6 }}>分类描述（供 LLM 参考）</div>
              <input
                type="text"
                value={newCategoryDescription}
                onChange={(e) => setNewCategoryDescription(e.target.value)}
                style={{ width: "100%" }}
                placeholder="例如：强调奖励函数、策略优化、环境交互的推荐方法"
              />

              <div className="divider"></div>
              <div className="muted" style={{ marginBottom: 6 }}>主题色</div>
              <div className="row">
                <input
                  type="color"
                  value={newCategoryColor}
                  onChange={(e) => setNewCategoryColor(e.target.value)}
                  style={{ width: 56, height: 42, padding: 0, border: "1px solid #d0d5dd", borderRadius: 10 }}
                />
                <input
                  type="text"
                  value={newCategoryColor}
                  onChange={(e) => setNewCategoryColor(e.target.value)}
                  style={{ flex: 1, minWidth: 200 }}
                  placeholder="#2f6fed"
                />
                <div
                  title="预览"
                  style={{
                    width: 42,
                    height: 42,
                    borderRadius: 12,
                    border: "1px solid rgba(0,0,0,.08)",
                    background: newCategoryColor,
                  }}
                />
              </div>

              {error ? (
                <div style={{ marginTop: 12, color: "#dc3545", fontSize: 13 }}>{error}</div>
              ) : null}

              <div className="divider"></div>
              <div className="row" style={{ justifyContent: "flex-end" }}>
                <button
                  onClick={() => {
                    setAddCategoryModalOpen(false);
                    setError("");
                  }}
                  disabled={busy || addingCategory}
                >
                  取消
                </button>
                <button className="primary" onClick={handleAddCategory} disabled={busy || addingCategory}>
                  {addingCategory ? "添加中..." : "确认添加"}
                </button>
              </div>
            </div>
          </div>
        ) : null}

        {editCategoryModalOpen ? (
          <div
            className="modal-backdrop"
            onMouseDown={(e) => {
              if (e.target === e.currentTarget) setEditCategoryModalOpen(false);
            }}
          >
            <div className="modal">
              <h3>编辑分类</h3>
              <div className="muted">修改分类名称与主题色</div>
              <div className="divider"></div>

              <div className="muted" style={{ marginBottom: 6 }}>分类名称</div>
              <input
                type="text"
                value={editCategoryName}
                onChange={(e) => setEditCategoryName(e.target.value)}
                style={{ width: "100%" }}
              />

              <div className="divider"></div>
              <div className="muted" style={{ marginBottom: 6 }}>分类描述（供 LLM 参考）</div>
              <input
                type="text"
                value={editCategoryDescription}
                onChange={(e) => setEditCategoryDescription(e.target.value)}
                style={{ width: "100%" }}
              />

              <div className="divider"></div>
              <div className="muted" style={{ marginBottom: 6 }}>主题色</div>
              <div className="row">
                <input
                  type="color"
                  value={editCategoryColor}
                  onChange={(e) => setEditCategoryColor(e.target.value)}
                  style={{ width: 56, height: 42, padding: 0, border: "1px solid #d0d5dd", borderRadius: 10 }}
                />
                <input
                  type="text"
                  value={editCategoryColor}
                  onChange={(e) => setEditCategoryColor(e.target.value)}
                  style={{ flex: 1, minWidth: 200 }}
                  placeholder="#2f6fed"
                />
                <div
                  title="预览"
                  style={{
                    width: 42,
                    height: 42,
                    borderRadius: 12,
                    border: "1px solid rgba(0,0,0,.08)",
                    background: editCategoryColor,
                  }}
                />
              </div>

              {error ? (
                <div style={{ marginTop: 12, color: "#dc3545", fontSize: 13 }}>{error}</div>
              ) : null}

              <div className="divider"></div>
              <div className="row" style={{ justifyContent: "flex-end" }}>
                <button
                  onClick={() => {
                    setEditCategoryModalOpen(false);
                    setError("");
                  }}
                  disabled={busy || updatingCategory}
                >
                  取消
                </button>
                <button className="primary" onClick={handleUpdateCategory} disabled={busy || updatingCategory}>
                  {updatingCategory ? "保存中..." : "保存修改"}
                </button>
              </div>
            </div>
          </div>
        ) : null}

        {uploadModalOpen ? (
          <div
            className="modal-backdrop"
            onMouseDown={(e) => {
              if (e.target === e.currentTarget) setUploadModalOpen(false);
            }}
          >
            <div className="modal">
              <h3>上传论文</h3>
              <div className="muted">选择 PDF，会自动解析 Abstract/Introduction 并完成多标签分类</div>
              <div className="divider"></div>

              <div className="muted" style={{ marginBottom: 6 }}>PDF 文件</div>
              <input
                type="file"
                accept="application/pdf"
                onChange={(e) => setFile(e.target.files && e.target.files[0] ? e.target.files[0] : null)}
              />
              {file ? <div className="muted" style={{ marginTop: 6, fontSize: 12 }}>已选择：{file.name}</div> : null}

              <div className="divider"></div>
              <div className="muted" style={{ marginBottom: 6 }}>code_url（可选）</div>
              <input
                type="text"
                value={uploadCodeUrl}
                onChange={(e) => setUploadCodeUrl(e.target.value)}
                style={{ width: "100%" }}
                placeholder="例如：https://github.com/xxx/xxx"
              />

              {error ? (
                <div style={{ marginTop: 12, color: "#dc3545", fontSize: 13 }}>{error}</div>
              ) : null}

              <div className="divider"></div>
              <div className="row" style={{ justifyContent: "flex-end" }}>
                <button
                  onClick={() => {
                    setUploadModalOpen(false);
                    setError("");
                  }}
                  disabled={busy}
                >
                  取消
                </button>
                <button className="primary" onClick={handleUpload} disabled={busy || !file}>
                  {busy ? "上传中..." : "确认上传"}
                </button>
              </div>
            </div>
          </div>
        ) : null}

        {researchDirectionModalOpen ? (
          <div
            className="modal-backdrop"
            onMouseDown={(e) => {
              if (e.target === e.currentTarget) setResearchDirectionModalOpen(false);
            }}
          >
            <div className="modal">
              <h3>设置研究方向</h3>
              <div className="muted">该内容会拼接进 LLM 提示词，辅助论文分类更贴合你的场景</div>
              <div className="divider"></div>

              <div className="muted" style={{ marginBottom: 6 }}>研究方向（可留空）</div>
              <textarea
                value={researchDirection}
                onChange={(e) => setResearchDirection(e.target.value)}
                style={{ width: "100%", minHeight: 110, resize: "vertical", borderRadius: 10, border: "1px solid #d0d5dd", padding: 10, fontFamily: "inherit" }}
                placeholder="例如：关注工业推荐系统中的多模态召回、冷启动与实时排序优化"
              />

              {error ? (
                <div style={{ marginTop: 12, color: "#dc3545", fontSize: 13 }}>{error}</div>
              ) : null}

              <div className="divider"></div>
              <div className="row" style={{ justifyContent: "flex-end" }}>
                <button
                  onClick={() => {
                    setResearchDirectionModalOpen(false);
                    setError("");
                  }}
                  disabled={busy || savingResearchDirection}
                >
                  取消
                </button>
                <button className="primary" onClick={handleSaveResearchDirection} disabled={busy || savingResearchDirection}>
                  {savingResearchDirection ? "保存中..." : "保存设置"}
                </button>
              </div>
            </div>
          </div>
        ) : null}
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
</script>
</body>
</html>
